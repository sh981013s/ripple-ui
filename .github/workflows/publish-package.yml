name: Publish Package

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: publish-package
  cancel-in-progress: false

jobs:
  publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Bump package version and changelog
        id: version
        run: |
          node <<'NODE'
          const fs = require('fs');
          const pkgPath = 'packages/ripple-ui/package.json';
          const changelogPath = 'CHANGELOG.md';
          const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
          const [major, minor, patch] = pkg.version.split('.').map(Number);
          const nextVersion = `${major}.${minor}.${patch + 1}`;
          pkg.version = nextVersion;
          fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + '\n');

          const today = new Date().toISOString().slice(0, 10);
          const current = fs.readFileSync(changelogPath, 'utf8');
          const entry = [
            '# Changelog',
            '',
            `## ${nextVersion} - ${today}`,
            '',
            '### Changed',
            '',
            '- Automated release from the latest `main` branch changes.',
            '',
          ].join('\n');
          const trimmed = current.replace(/^# Changelog\s*\n*/m, '').trimStart();
          fs.writeFileSync(changelogPath, `${entry}\n${trimmed}`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `version=${nextVersion}\n`);
          NODE

      - name: Commit release version
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add packages/ripple-ui/package.json CHANGELOG.md
          git commit -m "chore(release): v${VERSION}"
          git tag "v${VERSION}"
          git push origin main
          git push origin "v${VERSION}"

      - name: Build core package
        run: npm run build:core

      - name: Publish to npm
        working-directory: ./packages/ripple-ui
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          body_path: CHANGELOG.md
