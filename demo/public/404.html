<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Calmo UI</title>
    <script>
      (function () {
        var locationInfo = window.location;
        if (locationInfo.hostname === "sh981013s.github.io") {
          var redirectedPathname = locationInfo.pathname.replace(/^\/calmo-ui/, "") || "/";
          locationInfo.replace(
            "https://calmo.booung.org" +
              redirectedPathname +
              locationInfo.search +
              locationInfo.hash
          );
          return;
        }
        var base = locationInfo.pathname.split("/").slice(0, 2).join("/") || "";
        var redirectedPath = locationInfo.pathname.slice(base.length) || "/";
        var redirectedQuery = locationInfo.search ? locationInfo.search.slice(1) : "";
        var target =
          locationInfo.protocol +
          "//" +
          locationInfo.host +
          base +
          "/?p=" +
          encodeURIComponent(redirectedPath) +
          (redirectedQuery ? "&q=" + encodeURIComponent(redirectedQuery) : "") +
          locationInfo.hash;

        locationInfo.replace(target);
      })();
    </script>
  </head>
  <body></body>
</html>
